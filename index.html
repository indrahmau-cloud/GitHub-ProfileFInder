<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Profile Finder | Premium Developer Search</title>
  <meta name="description"
    content="A premium GitHub Profile Finder with detailed repository statistics, dark mode, and real-time user search." />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Grotesk:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="container">

    <header class="header">
      <div class="header-logo">
        <svg viewBox="0 0 16 16">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
            0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
            -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
            .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
            -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27
            .68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
            .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
            0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8
            c0-4.42-3.58-8-8-8z" />
        </svg>
        <h1>profile<span>.</span>find</h1>
      </div>
      <p>search any github user by username</p>
    </header>

    <form class="search-wrap" onsubmit="event.preventDefault(); fetchProfile();">
      <div class="search-prefix">github.com /</div>
      <input type="text" id="userInput" placeholder="username" autocomplete="off" autocorrect="off"
        spellcheck="false" />
      <button type="submit">SEARCH →</button>
    </form>

    <div class="suggestions">
      <span>try:</span>
      <button class="sug-btn" onclick="quickSearch('indrahmau-cloud')">indrahmau-cloud</button>
      <button class="sug-btn" onclick="quickSearch('torvalds')">torvalds</button>
      <button class="sug-btn" onclick="quickSearch('gaearon')">gaearon</button>
      <button class="sug-btn" onclick="quickSearch('sindresorhus')">sindresorhus</button>
      <button class="sug-btn" onclick="quickSearch('tj')">tj</button>
      <button class="sug-btn" onclick="quickSearch('yyx990803')">yyx990803</button>
      <button class="sug-btn" onclick="quickSearch('addyosmani')">addyosmani</button>
    </div>

    <div id="result"></div>

  </div>

  <script src="app.js"></script>
</body>

</html>
